name: Docs — Build & Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "src/**"
      - ".github/workflows/docs.yml"

# GitHub Pages へのデプロイに必要な権限設定
permissions:
  contents: read
  pages: write
  id-token: write

# 古いデプロイが走っている場合にキャンセルして最新を優先
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Sphinx docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python (match pyproject.toml minimum)
        run: uv python install 3.11

      - name: Install package and docs dependencies
        run: uv sync --extra docs

      # ── Sphinx ビルド ───────────────────────────────────────────────────
      - name: Build HTML documentation
        env:
          GA_ID: G-DGY5EE667H
        run: |
          # 日本語版 (ja) のビルド
          uv run sphinx-build -b html -W --keep-going docs/ docs/_build/html/ja
          
          # 英語版 (en) のビルド
          uv run sphinx-build -b html -W --keep-going -D language=en docs/ docs/_build/html/en

          # 言語振り分け用の root index.html を作成
          cat << 'EOF' > docs/_build/html/index.html
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>DWH-Auditor Documentation</title>
              <script>
                var lang = navigator.language || navigator.userLanguage;
                if (lang && lang.indexOf('ja') === 0) {
                  window.location.replace('./ja/');
                } else {
                  window.location.replace('./en/');
                }
              </script>
            </head>
            <body>
              <p>Redirecting... <a href="./ja/">日本語</a> | <a href="./en/">English</a></p>
            </body>
          </html>
          EOF

      # ── GitHub Pages 用アーティファクトのアップロード ─────────────────
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
